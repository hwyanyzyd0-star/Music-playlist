<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Music Playlist</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<style>
  :root{--r:#FF0000;--rd:#cc0000;--dk:#060606;--c:#0f0f0f;--c2:#161616;--c3:#1e1e1e;--t:#fff;--m:#888;--b:#1f1f1f;--b2:#2a2a2a;}
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--dk);color:var(--t);font-family:'Cairo',sans-serif;min-height:100vh}
  body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 80% 0%,rgba(255,0,0,.09) 0%,transparent 50%),radial-gradient(ellipse at 0% 100%,rgba(255,0,0,.05) 0%,transparent 50%);pointer-events:none;z-index:0}
  .w{max-width:740px;margin:0 auto;padding:28px 16px 60px;position:relative;z-index:1}

  .hdr{text-align:center;margin-bottom:28px}
  .logo{display:inline-flex;align-items:center;gap:12px;margin-bottom:6px}
  .logo svg{width:36px;height:36px;filter:drop-shadow(0 0 12px rgba(255,0,0,.5))}
  .logo b{font-size:22px;letter-spacing:-.5px}
  .logo b span{color:var(--r)}
  .hdr p{font-size:12px;color:var(--m);letter-spacing:.5px}

  /* Player */
  .player{background:var(--c);border:1px solid var(--b);border-radius:18px;overflow:hidden;margin-bottom:20px;display:none;box-shadow:0 0 40px rgba(255,0,0,.08)}
  .player.on{display:block;animation:fi .3s ease}
  .pinfo{padding:14px 18px;display:flex;align-items:center;gap:12px;background:rgba(0,0,0,.4)}
  .pthumb{width:48px;height:48px;border-radius:10px;flex-shrink:0;overflow:hidden;background:var(--b)}
  .pthumb img{width:100%;height:100%;object-fit:cover}
  .pmeta{flex:1;min-width:0}
  .pname{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .partist{font-size:11px;color:var(--m);margin-top:2px}
  .pcontrols{display:flex;align-items:center;gap:8px;flex-shrink:0}
  .pctrl{background:var(--b2);border:none;color:var(--t);width:32px;height:32px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
  .pctrl:hover{background:var(--r);transform:scale(1.05)}
  .pctrl svg{width:13px;height:13px;fill:currentColor}
  .pbadge{background:var(--r);color:#fff;font-size:10px;font-weight:800;padding:3px 9px;border-radius:20px;flex-shrink:0;animation:pulse 2s infinite}
  @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(255,0,0,.4)}50%{box-shadow:0 0 0 6px rgba(255,0,0,0)}}
  .pframe{position:relative;padding-bottom:56.25%;background:#000}
  .pframe iframe{position:absolute;inset:0;width:100%;height:100%;border:none}

  /* Search */
  .scard{background:var(--c);border:1px solid var(--b);border-radius:14px;padding:18px;margin-bottom:14px}
  .scard label{font-size:11px;color:var(--m);display:block;margin-bottom:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px}
  .srow{display:flex;gap:8px}
  .sinp{flex:1;background:var(--dk);border:1px solid var(--b);border-radius:10px;padding:12px 14px;color:var(--t);font-family:'Cairo',sans-serif;font-size:14px;outline:none;transition:border-color .2s}
  .sinp:focus{border-color:var(--r)}.sinp::placeholder{color:#333}
  .sbtn{background:var(--r);color:#fff;border:none;border-radius:10px;padding:12px 18px;font-family:'Cairo',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:6px;white-space:nowrap}
  .sbtn:hover{background:var(--rd);transform:translateY(-1px)}.sbtn:disabled{opacity:.4;cursor:not-allowed;transform:none}
  .smsg{font-size:12px;padding:9px 12px;border-radius:8px;margin-top:10px;display:none}
  .smsg.ok{background:rgba(29,185,84,.08);border:1px solid rgba(29,185,84,.2);color:#1DB954;display:block}
  .smsg.er{background:rgba(255,80,80,.08);border:1px solid rgba(255,80,80,.2);color:#ff7070;display:block}

  .import-area{border:2px dashed var(--b2);border-radius:10px;padding:14px;text-align:center;cursor:pointer;transition:all .2s;margin-top:12px;color:var(--m);font-size:12px}
  .import-area:hover{border-color:var(--r);color:var(--r);background:rgba(255,0,0,.04)}
  .import-area input{display:none}

  /* Results */
  .res{background:var(--c);border:1px solid var(--b);border-radius:14px;overflow:hidden;margin-bottom:14px;display:none}
  .res.on{display:block;animation:fi .2s ease}
  .res-hdr{padding:11px 16px;font-size:11px;color:var(--m);font-weight:700;text-transform:uppercase;letter-spacing:1px;border-bottom:1px solid var(--b);display:flex;align-items:center;justify-content:space-between}
  .res-close{background:none;border:none;color:#444;cursor:pointer;font-size:18px;padding:0 4px;transition:color .2s}
  .res-close:hover{color:#fff}
  .ri{display:flex;align-items:center;gap:11px;padding:11px 16px;border-bottom:1px solid var(--b);transition:background .15s}
  .ri:last-child{border-bottom:none}.ri:hover{background:var(--c2)}
  .rthumb{width:72px;height:42px;border-radius:6px;flex-shrink:0;overflow:hidden;background:var(--b)}
  .rthumb img{width:100%;height:100%;object-fit:cover}
  .rinfo{flex:1;min-width:0}
  .rname{font-size:13px;font-weight:600;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;line-height:1.4}
  .rch{font-size:11px;color:var(--m);margin-top:3px}
  .rbtns{display:flex;gap:5px;flex-shrink:0}
  .rplay{background:var(--r);color:#fff;border:none;border-radius:6px;padding:7px 10px;font-family:'Cairo',sans-serif;font-size:11px;font-weight:700;cursor:pointer;transition:all .2s;white-space:nowrap}
  .rplay:hover{background:var(--rd)}
  .radd{background:var(--c2);color:var(--t);border:1px solid var(--b);border-radius:6px;padding:7px 10px;font-family:'Cairo',sans-serif;font-size:11px;font-weight:700;cursor:pointer;transition:all .2s;white-space:nowrap}
  .radd:hover{border-color:var(--r);color:var(--r)}

  /* Recent */
  .recent{background:var(--c);border:1px solid var(--b);border-radius:14px;padding:16px;margin-bottom:14px;display:none}
  .recent.on{display:block}
  .recent-hdr{font-size:11px;color:var(--m);font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:12px}
  .recent-list{display:flex;gap:10px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none}
  .recent-list::-webkit-scrollbar{display:none}
  .ri2{flex-shrink:0;width:100px;cursor:pointer;transition:transform .2s}
  .ri2:hover{transform:translateY(-3px)}
  .ri2-thumb{width:100px;height:60px;border-radius:8px;overflow:hidden;background:var(--b);margin-bottom:6px;position:relative}
  .ri2-thumb img{width:100%;height:100%;object-fit:cover}
  .ri2-ov{position:absolute;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .2s}
  .ri2:hover .ri2-ov{opacity:1}
  .ri2-ov svg{width:20px;height:20px;fill:#fff}
  .ri2-name{font-size:11px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .ri2-ch{font-size:10px;color:var(--m);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

  /* Playlist */
  .lhdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;padding:0 2px}
  .lhdr-l{display:flex;align-items:center;gap:8px}
  .ltitle{font-size:12px;color:var(--m);font-weight:700;text-transform:uppercase;letter-spacing:1px}
  .cnt{background:var(--r);color:#fff;font-size:11px;font-weight:800;padding:2px 8px;border-radius:20px}
  .tl{background:var(--c);border:1px solid var(--b);border-radius:14px;overflow:hidden}
  .emp{text-align:center;padding:44px 20px;color:#2a2a2a;font-size:14px}
  .emp-i{font-size:30px;margin-bottom:8px;opacity:.5}

  .ti{display:flex;align-items:center;gap:11px;padding:12px 16px;border-bottom:1px solid var(--b);transition:background .15s;animation:fi .25s ease;cursor:pointer;user-select:none}
  .ti:last-child{border-bottom:none}.ti:hover{background:var(--c2)}
  .ti.playing{background:rgba(255,0,0,.06);border-right:2px solid var(--r)}
  .ti.dragging{opacity:.4;background:var(--c3)}
  .ti.drag-over{border-top:2px solid var(--r)}
  .tdrag{color:#333;cursor:grab;font-size:14px;padding:4px;flex-shrink:0}
  .tdrag:active{cursor:grabbing}
  .tnum{font-size:11px;color:#444;width:18px;text-align:center;flex-shrink:0}
  .tthumb{width:52px;height:38px;border-radius:6px;flex-shrink:0;overflow:hidden;background:var(--b);position:relative}
  .tthumb img{width:100%;height:100%;object-fit:cover}
  .tov{position:absolute;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .2s}
  .ti:hover .tov,.ti.playing .tov{opacity:1}
  .ti.playing .tov{background:rgba(255,0,0,.35)}
  .tov svg{width:14px;height:14px;fill:#fff}
  .tinfo{flex:1;min-width:0}
  .tname{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .tch{font-size:11px;color:var(--m);margin-top:2px}
  .tdel{background:none;border:none;color:#2a2a2a;cursor:pointer;font-size:14px;padding:6px;border-radius:4px;transition:color .2s;flex-shrink:0}
  .tdel:hover{color:#f55}

  .eb{background:var(--c);border:1px solid var(--b);border-radius:14px;padding:15px 18px;margin-top:14px}
  .eb-info{font-size:13px;color:var(--m);margin-bottom:12px;display:block}
  .ebs{display:flex;gap:10px;flex-wrap:wrap}
  .xb-wrap{display:flex;flex-direction:column;align-items:center;gap:5px}
  .xb{padding:8px 14px;border-radius:8px;border:1px solid var(--b);background:var(--c2);color:var(--t);font-family:'Cairo',sans-serif;font-size:12px;font-weight:700;cursor:pointer;transition:all .2s}
  .xb:hover{border-color:#1DB954;color:#1DB954}
  .xb.red:hover{border-color:var(--r);color:var(--r)}
  .xb.cl{border-color:transparent;color:#555}.xb.cl:hover{border-color:#f55;color:#f55}
  .xb-desc{font-size:10px;color:#444;text-align:center}

  .sp{display:inline-block;width:13px;height:13px;border:2px solid #222;border-top-color:var(--r);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-left:6px}
  @keyframes spin{to{transform:rotate(360deg)}}
  @keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  .ft{text-align:center;margin-top:32px;font-size:11px;color:#222}
</style>
</head>
<body>
<div class="w">

  <div class="hdr">
    <div class="logo">
      <svg viewBox="0 0 24 24" fill="red"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg>
      <b>Music <span>Playlist</span></b>
    </div>
    <p>ابحث · شغّل · رتّب · احفظ</p>
  </div>

  <!-- Player -->
  <div class="player" id="player">
    <div class="pinfo">
      <div class="pthumb"><img id="pImg" src="" alt=""></div>
      <div class="pmeta">
        <div class="pname" id="pName">—</div>
        <div class="partist" id="pArtist">—</div>
      </div>
      <div class="pcontrols">
        <button class="pctrl" onclick="playPrev()" title="السابق"><svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg></button>
        <button class="pctrl" onclick="playNext()" title="التالي"><svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6h2v12h-2z"/></svg></button>
      </div>
      <div class="pbadge">▶ يشتغل</div>
    </div>
    <div class="pframe"><iframe id="ytf" src="" allowfullscreen allow="autoplay;encrypted-media"></iframe></div>
  </div>

  <!-- Search -->
  <div class="scard">
    <label>🔍 ابحث عن أغنية</label>
    <div class="srow">
      <input class="sinp" id="sinp" placeholder="اكتب اسم الأغنية أو الفنان...">
      <button class="sbtn" id="sbtn" onclick="doSearch()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        بحث
      </button>
    </div>
    <div class="smsg" id="smsg"></div>
    <div class="import-area" onclick="document.getElementById('fileInp').click()">
      <input type="file" id="fileInp" accept=".json" onchange="importJSON(this)">
      📂 استيراد قائمة محفوظة (JSON)
    </div>
  </div>

  <!-- Results -->
  <div class="res" id="res">
    <div class="res-hdr">
      <span>نتائج البحث</span>
      <button class="res-close" onclick="closeRes()">✕</button>
    </div>
    <div id="resList"></div>
  </div>

  <!-- Recent -->
  <div class="recent" id="recentSec">
    <div class="recent-hdr">🕐 آخر الأغاني المشغلة</div>
    <div class="recent-list" id="recentList"></div>
  </div>

  <!-- Playlist -->
  <div class="lhdr">
    <div class="lhdr-l">
      <span class="ltitle">قائمتك</span>
      <span class="cnt" id="cnt">0</span>
    </div>
  </div>
  <div class="tl" id="tl">
    <div class="emp"><div class="emp-i">🎵</div>ابحث عن أغنية وأضفها لقائمتك</div>
  </div>

  <div class="eb" id="eb" style="display:none">
    <span class="eb-info" id="ebi">—</span>
    <div class="ebs">
      <div class="xb-wrap">
        <button class="xb" onclick="exportTxt()">⬇ TXT</button>
        <span class="xb-desc">قائمة نصية للمشاركة</span>
      </div>
      <div class="xb-wrap">
        <button class="xb" onclick="exportCsv()">⬇ CSV</button>
        <span class="xb-desc">جدول تفتحه في Excel</span>
      </div>
      <div class="xb-wrap">
        <button class="xb red" onclick="exportJSON()">⬇ JSON</button>
        <span class="xb-desc">نسخة احتياطية للقائمة</span>
      </div>
      <div class="xb-wrap">
        <button class="xb cl" onclick="clearAll()">🗑 مسح</button>
        <span class="xb-desc">حذف كل الأغاني</span>
      </div>
    </div>
  </div>

  <div class="ft">مشغل موسيقى يعمل عبر يوتيوب</div>
</div>

<script>
const YT_KEY = 'AIzaSyDSR8DiiBMiQcnQeo2lW5XK7XySsQTublE';
let T = [], nowId = null, recent = [], dragSrc = null;

function loadStorage() {
  try {
    const s = localStorage.getItem('yt_pl'); if(s) T = JSON.parse(s);
    const r = localStorage.getItem('yt_rc'); if(r) recent = JSON.parse(r);
  } catch(e){}
  renderList(); renderRecent();
}

function saveStorage() {
  try {
    localStorage.setItem('yt_pl', JSON.stringify(T));
    localStorage.setItem('yt_rc', JSON.stringify(recent));
  } catch(e){}
}

document.getElementById('sinp').addEventListener('keydown', e => { if(e.key==='Enter') doSearch(); });

async function doSearch() {
  const q = document.getElementById('sinp').value.trim();
  if (!q) { showMsg('اكتب اسم الأغنية أولاً', 'er'); return; }
  const btn = document.getElementById('sbtn');
  btn.disabled = true;
  showMsg('<span class="sp"></span> جاري البحث...', 'ok');
  try {
    const url = `https://www.googleapis.com/youtube/v3/search?part=snippet&q=${encodeURIComponent(q)}&type=video&videoCategoryId=10&maxResults=8&key=${YT_KEY}`;
    const res = await fetch(url);
    const data = await res.json();
    if (data.error) throw new Error(data.error.message);
    if (!data.items?.length) throw new Error('no results');
    renderResults(data.items);
    document.getElementById('smsg').className = 'smsg';
  } catch(e) {
    showMsg('⚠️ ' + (e.message || 'تعذر البحث'), 'er');
  }
  btn.disabled = false;
}

function renderResults(items) {
  const list = document.getElementById('resList');
  list.innerHTML = '';
  items.forEach(v => {
    const id = v.id.videoId;
    const title = v.snippet.title;
    const ch = v.snippet.channelTitle;
    const thumb = v.snippet.thumbnails?.medium?.url || '';
    const div = document.createElement('div');
    div.className = 'ri';
    div.innerHTML = `
      <div class="rthumb"><img src="${thumb}" loading="lazy"></div>
      <div class="rinfo">
        <div class="rname">${esc(title)}</div>
        <div class="rch">${esc(ch)}</div>
      </div>
      <div class="rbtns">
        <button class="rplay" onclick="play('${id}','${esc2(title)}','${esc2(ch)}','${thumb}')">▶</button>
        <button class="radd" onclick="addT('${id}','${esc2(title)}','${esc2(ch)}','${thumb}')">+</button>
      </div>`;
    list.appendChild(div);
  });
  document.getElementById('res').classList.add('on');
}

function closeRes() { document.getElementById('res').classList.remove('on'); }

function play(id, name, artist, thumb) {
  nowId = id;
  document.getElementById('pName').textContent = name;
  document.getElementById('pArtist').textContent = artist;
  document.getElementById('pImg').src = thumb;
  document.getElementById('ytf').src = `https://www.youtube.com/embed/${id}?autoplay=1&rel=0`;
  document.getElementById('player').classList.add('on');
  document.querySelectorAll('.ti').forEach(el => el.classList.toggle('playing', el.dataset.vid === id));
  recent = recent.filter(r => r.id !== id);
  recent.unshift({id, name, artist, thumb});
  if (recent.length > 10) recent.pop();
  saveStorage(); renderRecent();
  window.scrollTo({top:0, behavior:'smooth'});
}

function playNext() {
  const i = T.findIndex(t => t.id === nowId);
  if (i < T.length - 1) { const t = T[i+1]; play(t.id,t.name,t.artist,t.thumb); }
}

function playPrev() {
  const i = T.findIndex(t => t.id === nowId);
  if (i > 0) { const t = T[i-1]; play(t.id,t.name,t.artist,t.thumb); }
}

function renderRecent() {
  const sec = document.getElementById('recentSec');
  const list = document.getElementById('recentList');
  if (!recent.length) { sec.classList.remove('on'); return; }
  sec.classList.add('on');
  list.innerHTML = '';
  recent.slice(0,8).forEach(v => {
    const d = document.createElement('div');
    d.className = 'ri2';
    d.onclick = () => play(v.id, v.name, v.artist, v.thumb);
    d.innerHTML = `
      <div class="ri2-thumb">
        <img src="${v.thumb}" loading="lazy">
        <div class="ri2-ov"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div>
      </div>
      <div class="ri2-name">${esc(v.name)}</div>
      <div class="ri2-ch">${esc(v.artist)}</div>`;
    list.appendChild(d);
  });
}

function addT(id, name, artist, thumb) {
  if (T.find(t=>t.id===id)) { showMsg('⚠️ الأغنية موجودة بالفعل', 'er'); return; }
  T.push({id, name, artist, thumb});
  saveStorage(); renderList();
  showMsg('✓ تمت إضافة "' + name + '"', 'ok');
  setTimeout(()=>{ document.getElementById('smsg').className='smsg'; }, 2500);
}

function renderList() {
  const list = document.getElementById('tl');
  document.getElementById('cnt').textContent = T.length;
  if (!T.length) {
    list.innerHTML = '<div class="emp"><div class="emp-i">🎵</div>ابحث عن أغنية وأضفها لقائمتك</div>';
    document.getElementById('eb').style.display = 'none'; return;
  }
  list.innerHTML = '';
  T.forEach((t,i) => {
    const d = document.createElement('div');
    d.className = 'ti' + (t.id===nowId?' playing':'');
    d.dataset.vid = t.id; d.dataset.i = i;
    d.draggable = true;
    d.style.animationDelay = Math.min(i*.02,.3)+'s';
    d.addEventListener('dragstart', e => { dragSrc=i; d.classList.add('dragging'); e.dataTransfer.effectAllowed='move'; });
    d.addEventListener('dragend', () => { d.classList.remove('dragging'); document.querySelectorAll('.ti').forEach(el=>el.classList.remove('drag-over')); });
    d.addEventListener('dragover', e => { e.preventDefault(); d.classList.add('drag-over'); });
    d.addEventListener('dragleave', () => d.classList.remove('drag-over'));
    d.addEventListener('drop', e => {
      e.preventDefault();
      if (dragSrc===null||dragSrc===i) return;
      const m = T.splice(dragSrc,1)[0]; T.splice(i,0,m); dragSrc=null;
      saveStorage(); renderList();
    });
    d.innerHTML = `
      <div class="tdrag">⠿</div>
      <div class="tnum">${i+1}</div>
      <div class="tthumb"><img src="${t.thumb}" loading="lazy"><div class="tov"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div></div>
      <div class="tinfo"><div class="tname">${esc(t.name)}</div><div class="tch">${esc(t.artist)}</div></div>
      <button class="tdel" onclick="event.stopPropagation();delT(${i})">✕</button>`;
    d.onclick = e => { if(!e.target.classList.contains('tdel')&&!e.target.classList.contains('tdrag')) play(t.id,t.name,t.artist,t.thumb); };
    list.appendChild(d);
  });
  document.getElementById('ebi').textContent = T.length + ' أغنية في قائمتك';
  document.getElementById('eb').style.display = 'flex';
}

function delT(i) {
  if(T[i].id===nowId){ document.getElementById('player').classList.remove('on'); document.getElementById('ytf').src=''; nowId=null; }
  T.splice(i,1); saveStorage(); renderList();
}

function clearAll() {
  if(T.length&&confirm('هل تريد مسح جميع الأغاني؟')) {
    T=[]; nowId=null;
    document.getElementById('player').classList.remove('on');
    document.getElementById('ytf').src='';
    saveStorage(); renderList();
  }
}

function importJSON(input) {
  const file = input.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      if (Array.isArray(data)) {
        data.forEach(t => { if(t.id&&t.name&&!T.find(x=>x.id===t.id)) T.push(t); });
        saveStorage(); renderList();
        showMsg('✓ تم استيراد ' + data.length + ' أغنية', 'ok');
      }
    } catch { showMsg('⚠️ الملف غير صحيح', 'er'); }
  };
  reader.readAsText(file); input.value='';
}

function dl(c,n,t){const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([c],{type:t}));a.download=n;a.click();}
function exportTxt(){if(!T.length)return;const l=['🎵 قائمتي','عدد الأغاني: '+T.length,'─'.repeat(40),''];T.forEach((t,i)=>{l.push(`${i+1}. ${t.name}`);l.push(`   ${t.artist}`);l.push(`   https://youtube.com/watch?v=${t.id}`);l.push('');});dl(l.join('\n'),'قائمتي.txt','text/plain;charset=utf-8');}
function exportCsv(){if(!T.length)return;const rows=[['#','الأغنية','القناة','رابط']];T.forEach((t,i)=>rows.push([i+1,t.name,t.artist,`https://youtube.com/watch?v=${t.id}`]));dl('\uFEFF'+rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n'),'قائمتي.csv','text/csv;charset=utf-8');}
function exportJSON(){if(!T.length)return;dl(JSON.stringify(T,null,2),'قائمتي.json','application/json');}
function showMsg(html,t){const e=document.getElementById('smsg');e.innerHTML=html;e.className='smsg '+t;}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function esc2(s){return String(s||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'");}

loadStorage();
</script>
